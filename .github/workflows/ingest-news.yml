name: ingest-news

on:
  schedule:
    # Every 6 hours — keeps the free-plan 2,000-search lifetime budget
    # at ~16 months while pulling ~800 articles per day, well under the
    # 200k articles / 30 days cap.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you forcing a news pull?'
        required: false
        default: 'manual'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/cron/ingest-news
        env:
          URL: ${{ secrets.NEWS_INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::NEWS_INGEST_URL or CRON_SECRET secret is missing"
            exit 1
          fi
          echo "Pulling fresh news via $URL"
          HTTP_STATUS=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 300)
          echo "HTTP $HTTP_STATUS"
          cat response.json
          if [ "$HTTP_STATUS" != "200" ]; then
            exit 1
          fi
